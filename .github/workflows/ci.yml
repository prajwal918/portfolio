name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      
      - name: Use Node.js
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          
      - name: Run Unit Tests
        continue-on-error: true
        run: node tests/main.test.js
        
      - name: Build Docker Image
        continue-on-error: true
        run: docker-compose build || true
